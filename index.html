<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>5,6장 과제</title>
    <style>
        .title {
            font-size: 36px;    
            text-align: center;  
            margin-top: 20px;
        }
        .bold {
            font-weight: bold;  
        }

        input[type="text"] {
            background-color: #FFD1DC; 
        }
        input[type="password"] {
            background-color: #E0F7FA; 
        }
        .box {
            width: 120px;
            height: 50px;
            background-color: orange;  
            text-align: center;      
            line-height: 50px;          
            border-radius: 10px;        
            margin-top: 10px;
        }
        .box a {
            color: white;
            text-decoration: none;
            display: block; 
        }
    </style>
</head>
<body>

    <div class="title">자기소개</div>
    <p>20230835 유경원입니다.</p>
    <p class="bold">잘부탁드립니다.</p>

    <hr>

    <div>
        <p>아이디: <input type="text"></p>
        <p>비밀번호: <input type="password"></p>
    </div>

    <hr>

    <div class="box">
        <a href="#">Click</a>
    </div>

</body>
</html>
