<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>7장 실습-Flexbox변환</title>
    <style>
        .container {
            width: 1080px;
            margin: 0 auto 8px auto;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .container.header {
            justify-content: flex-start;
        }

        .left {
            width: 740px;
            height: 428px;
            background-color: red;
        }
        .right {
            width: 332px;
            height: 428px;
            background-color: blue;
        }

        ul.gnb {
            display: flex; 
            padding: 8px 0;
            margin: 0;
            background-color: green;
            list-style-type: none;
            gap: 16px; 
        }

        ul.rank {
            display: flex;
            padding: 8px 0;
            margin: 0;
            background-color: yellow;
            list-style-type: none;
        }

        .footer {
            width: 100%;
            height: 80px;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div class="container header">
        <h1>Logo</h1>
    </div>
    <div class="container">
        <ul class="gnb">
            <li>메일</li>
            <li>카페</li>
            <li>블로그</li>
            <li>쇼핑</li>
            <li>사전</li>
            <li>뉴스</li>
            <li>증권</li>
            <li>부동산</li>
            <li>지도</li>
        </ul>
        <ul class="rank">
            <li>실시간 검색 순위</li>
        </ul>
    </div>
    <div class="container">
        <div class="left"></div>
        <div class="right"></div>
    </div>
    <div class="container">
        <div class="left"></div>
        <div class="right"></div>
    </div>
    <div class="container">
        <div class="footer"></div>
    </div>
</body>
</html>
